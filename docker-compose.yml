services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coryd
      POSTGRES_USER: coryd
      POSTGRES_PASSWORD: coryd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coryd -d coryd"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env.example
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    env_file:
      - ./apps/web/.env.example
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
